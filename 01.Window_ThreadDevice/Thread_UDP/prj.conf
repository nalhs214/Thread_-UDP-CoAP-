# ── Thread / OpenThread ──────────────────────────
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_FTD=y
# 네트워크를 코드에서 직접 시작 (CLI 미사용)
CONFIG_OPENTHREAD_MANUAL_START=y

# ── 네트워킹 (IPv6 / UDP / BSD 소켓) ─────────────
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
# UDP 모듈을 Zephyr BSD 소켓(zsock_*)으로 구현하기 위함
CONFIG_NET_SOCKETS=y

# CoAP 단계에서 추가
# CONFIG_COAP=y

# ── DK 라이브러리 (버튼 / LED) ───────────────────
CONFIG_DK_LIBRARY=y
CONFIG_GPIO=y

# ── 로깅 ─────────────────────────────────────────
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_OPENTHREAD_LOG_LEVEL_INFO=y
CONFIG_THREAD_NAME=y

# ── 스택 크기 ────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
